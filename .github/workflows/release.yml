name: Release

on:
  release:
    types: [ published ]   # the release tag (e.g. v0.3.0) is the MinVer version

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # required to push to GitHub Packages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: dotnet pack Mokkit.sln -c Release -o ${{ github.workspace }}/artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/*

      - name: Push to NuGet.org        # nupkg + sibling snupkg symbol package
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push to GitHub Packages  # nupkg only (GitHub Packages ignores snupkg)
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --source https://nuget.pkg.github.com/GrafGenerator/index.json
          --skip-duplicate
