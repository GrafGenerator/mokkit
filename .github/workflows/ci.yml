name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # MinVer needs full history + tags

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Mokkit.sln

      - name: Build
        run: dotnet build Mokkit.sln -c Release --no-restore

      - name: Test
        run: dotnet test Mokkit.sln -c Release --no-build --verbosity normal

      - name: Pack (validate packaging)
        run: dotnet pack Mokkit.sln -c Release --no-build -o ${{ runner.temp }}/nupkg
