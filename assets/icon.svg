<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Mokkit — a revolver cylinder: steel barrel, a brass round chambered at the firing position,
       the M as the hub. Transparent ground; single self-contained file. -->
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d6dde3"/><stop offset=".5" stop-color="#929cab"/><stop offset="1" stop-color="#515a68"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d287"/><stop offset=".55" stop-color="#d3a349"/><stop offset="1" stop-color="#a9822f"/>
    </linearGradient>
  </defs>

  <!-- steel barrel: thick ring with 6 chambers + central hub knocked out (even-odd) -->
  <path fill="url(#steel)" fill-rule="evenodd" stroke="#3c434e" stroke-width="0.8"
        d="M10 50 a40 40 0 1 0 80 0 a40 40 0 1 0 -80 0 Z M35 50 a15 15 0 1 0 30 0 a15 15 0 1 0 -30 0 Z M44.4 22 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z M68.6 36 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z M68.6 64 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z M44.4 78 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z M20.2 64 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z M20.2 36 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z"/>

  <!-- brass round seated in the top chamber, dark primer center -->
  <circle cx="50" cy="22" r="5.6" fill="url(#brass)"/>
  <circle cx="50" cy="22" r="2" fill="#7c5c22"/>

  <!-- M hub: bright brass with a dark bronze rim so it holds on white -->
  <path d="M42 58 L42 44 L50 51.5 L58 44 L58 58" fill="none" stroke="#3f3110" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M42 58 L42 44 L50 51.5 L58 44 L58 58" fill="none" stroke="url(#brass)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
