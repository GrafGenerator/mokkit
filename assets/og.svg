<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1d24"/><stop offset="1" stop-color="#0a1318"/>
    </linearGradient>
    <radialGradient id="glow" gradientUnits="userSpaceOnUse" cx="295" cy="320" r="430">
      <stop offset="0" stop-color="#18383a" stop-opacity="0.55"/><stop offset="1" stop-color="#0d1a20" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d6dde3"/><stop offset=".5" stop-color="#929cab"/><stop offset="1" stop-color="#515a68"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d287"/><stop offset=".55" stop-color="#d3a349"/><stop offset="1" stop-color="#a9822f"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- faint concentric rings echoing the cylinder -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2">
    <circle cx="295" cy="320" r="212"/><circle cx="295" cy="320" r="288"/><circle cx="295" cy="320" r="366"/>
  </g>

