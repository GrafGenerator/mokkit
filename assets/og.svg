  <g transform="translate(115,140) scale(3.6)">
    <path fill="url(#steel)" fill-rule="evenodd" stroke="#3c434e" stroke-width="0.8"
          d="M10 50 a40 40 0 1 0 80 0 a40 40 0 1 0 -80 0 Z M35 50 a15 15 0 1 0 30 0 a15 15 0 1 0 -30 0 Z M44.4 22 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z M68.6 36 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z M68.6 64 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z M44.4 78 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z M20.2 64 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z M20.2 36 a5.6 5.6 0 1 0 11.2 0 a5.6 5.6 0 1 0 -11.2 0 Z"/>
    <circle cx="50" cy="22" r="5.6" fill="url(#brass)"/><circle cx="50" cy="22" r="2" fill="#7c5c22"/>
    <path d="M42 58 L42 44 L50 51.5 L58 44 L58 58" fill="none" stroke="#3f3110" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 58 L42 44 L50 51.5 L58 44 L58 58" fill="none" stroke="url(#brass)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- text -->
  <text x="548" y="214" font-family="Menlo, 'DejaVu Sans Mono', monospace" font-size="22" letter-spacing="5" fill="#d3a349">ARRANGE &#183; ACT &#183; INSPECT</text>
  <text x="543" y="348" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="122" font-weight="800" fill="#eef2f1">Mokkit<tspan fill="#d3a349">.</tspan></text>
  <rect x="549" y="378" width="188" height="4" rx="2" fill="#d3a349"/>
  <text x="548" y="448" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="31" fill="#a9b7bc">Tests that read like a story &#8212;</text>
  <text x="548" y="490" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="31" fill="#a9b7bc">plain, compilable C#. No DSL.</text>
  <text x="548" y="556" font-family="Menlo, 'DejaVu Sans Mono', monospace" font-size="23" fill="#d3a349">mokkit.net</text>
